<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Juego 5: Adivina la palabra secreta. Selecciona las letras correctas para descubrir la palabra misteriosa de Caperucita Roja.">
    <title>Juego 5: El Ahorcado del Bosque - Caperucita Roja</title>
    
    <link rel="icon" href="img/logo1.png" type="image/png">
    <link rel="stylesheet" href="css/juegos.css">
</head>
<body>

    <header>
        <div>🎮 Juego 5: El Ahorcado del Bosque</div>
        <div aria-live="polite">⭐ Puntaje Total: <span id="puntaje">0</span></div>
    </header>

    <main class="contenedor">
        <h1>Descubre la Palabra Secreta</h1>
        <p>Selecciona las letras del abecedario para adivinar la palabra del cuento antes de quedarte sin vidas. ¡Piensa rápido!</p>

        <!-- INDICADOR DE VIDAS -->
        <div class="ahorcado-vidas" id="vidas">
            ❤️❤️❤️❤️❤️
        </div>

        <!-- PALABRA OCULTA -->
        <section class="palabra-ahorcado" id="palabra-secreta" aria-label="Espacios de la palabra">
            <!-- Las letras/guiones se insertarán aquí dinámicamente -->
        </section>

        <!-- TECLADO DE LETRAS -->
        <section class="ahorcado-teclado" id="teclado" aria-label="Teclado virtual">
            <!-- Los botones de letras se generarán dinámicamente -->
        </section>

        <!-- CONTROLES -->
        <footer>
            <button class="btn-finalizar" id="btn-finalizar" onclick="validarJuego('final.html', 30)" style="display: none;">
                ✅ Finalizar Desafío Final
            </button>
            <button class="btn-reintentar" id="btn-reintentar" onclick="reiniciar()">
                🔄 Reintentar
            </button>
        </footer>

        <p class="mensaje" id="mensaje" aria-live="assertive"></p>
    </main>

    <script src="js/juego5.js"></script>
</body>
</html>
