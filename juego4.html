<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Juego 4: Juego de memoria de Caperucita Roja. Encuentra las parejas de los personajes del bosque para ganar puntos.">
    <title>Juego 4: Memoria del Bosque - Caperucita Roja</title>
    
    <link rel="icon" href="img/logo1.png" type="image/png">
    <link rel="stylesheet" href="css/juegos.css">
</head>
<body>

    <header>
        <div>🎮 Juego 4: Memoria del Bosque</div>
        <div aria-live="polite">⭐ Puntaje Total: <span id="puntaje">0</span></div>
    </header>

    <main class="contenedor">
        <h1>Parejas del Bosque</h1>
        <p>Haz clic en las cartas misteriosas para voltearlas y encontrar a los personajes iguales. ¡Demuestra tu buena memoria!</p>

        <!-- TABLERO DE MEMORIA -->
        <section class="memoria-tablero" id="tablero" aria-label="Tablero de juego de memoria">
            <!-- Las cartas se generarán dinámicamente desde JavaScript -->
        </section>

        <!-- CONTROLES -->
        <footer>
            <button class="btn-finalizar" id="btn-finalizar" onclick="validarJuego()" style="display: none;">
                ✅ Finalizar Juego 4
            </button>
            <button class="btn-reintentar" id="btn-reintentar" onclick="reiniciar()">
                🔄 Reintentar
            </button>
        </footer>

        <p class="mensaje" id="mensaje" aria-live="assertive"></p>
    </main>

    <script src="js/juego4.js"></script>
</body>
</html>
